<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Admin | Edit Products</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<link rel="stylesheet" href="admin.css">
<link rel="stylesheet" href="products-table.css">

<style>
.products-table input,
.products-table select{
  width:100%;
  padding:6px;
  border:1px solid #ddd;
  border-radius:6px;
  font-size:13px;
}

.products-table input[type="checkbox"]{
  width:auto;
  transform:scale(1.2);
}

.save-btn{
  padding:6px 10px;
  border:none;
  background:#111;
  color:#fff;
  border-radius:6px;
  cursor:pointer;
}

.update-all{
  background:#0a7;
  color:#fff;
  border:none;
  padding:8px 16px;
  border-radius:8px;
  cursor:pointer;
}
</style>
</head>

<body>

<header class="admin-header">
  <a href="dashboard.html">← Back</a>
  <h1>Edit Products</h1>
  <button class="update-all" id="updateAllBtn">Update All</button>
</header>

<main class="products-page table-wrap">
  <table class="products-table">
    <thead>
      <tr>
        <th>Image</th>
        <th>Name</th>
        <th>Brand</th>
        <th>Category</th>
        <th>Style</th>
        <th>Price</th>
        <th>MRP</th>
        <th>Active</th>
        <th>Save</th>
      </tr>
    </thead>
    <tbody id="editorBody"></tbody>
  </table>
</main>

<script type="module" src="product-editor.js"></script>
</body>
</html>
