<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Manage Product Colors</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="admin.css">

<style>

.wrapper{padding:30px}

.product-block{
  background:#fff;
  padding:20px;
  border-radius:12px;
  margin-bottom:30px;
  box-shadow:0 5px 15px rgba(0,0,0,0.05);
}

.product-title{
  font-size:18px;
  margin-bottom:15px;
  font-weight:600;
}

.image-row{
  display:flex;
  gap:20px;
  flex-wrap:wrap;
}

.image-card{
  width:200px;
  border:1px solid #eee;
  border-radius:10px;
  padding:15px;
  text-align:center;
  background:#fafafa;
  transition:.2s;
}

.image-card:hover{
  box-shadow:0 5px 15px rgba(0,0,0,0.08);
}

.image-card img{
  width:100%;
  height:140px;
  object-fit:cover;
  border-radius:8px;
}

.old-color{
  font-size:13px;
  margin:8px 0;
  color:#666;
}

select,input{
  width:100%;
  padding:8px;
  margin-top:6px;
  border-radius:6px;
  border:1px solid #ddd;
}

.btn{
  width:100%;
  margin-top:8px;
  padding:8px;
  border:none;
  border-radius:6px;
  cursor:pointer;
  font-weight:500;
}

.update-btn{background:#111;color:#fff;}
.add-btn{background:#0a7;color:#fff;}

</style>
</head>

<body>

<header class="admin-header">
  <a href="dashboard.html">← Back</a>
  <h1>Manage Product Colors</h1>
</header>

<div class="wrapper" id="colorContainer"></div>

<script type="module" src="product-color-manager.js"></script>
</body>
</html>
